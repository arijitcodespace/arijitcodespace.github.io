title: Arijit Dey
description: Machine Learning • Vision-Language • Graph ML • Optimization

locale: en-US

# Author profile (shown in the sidebar on pages that set `author_profile: true`)
author:
  name: "Arijit Dey"
  avatar: "/assets/img/passport.jpg"
  bio: "Data Scientist (AI Health Analytics) • MS ECE @ UCLA (2024)"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:gekeryuken2012@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/arijit-d-322066bb/"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/arijitcodespace"

# Pretty links
permalink: /:categories/:year/:month/:day/:title/

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

# Optional but helpful plugins (all allowlisted on GitHub Pages)
plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

# Blog
paginate: 5
paginate_path: /blog/page:num/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

# Include custom pages folder
include:
  - _pages

# Search
search: true

# (Optional) If you have a baseurl (like for project pages), set it here without trailing slash.
# baseurl: ""
# url: ""   # the base hostname & protocol for your site

# (Optional) Repository metadata (used by MM breadcrumbs / edit links)
# repository: "arijitcodespace/arijitcodespace.github.io"
